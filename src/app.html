<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<title>Reflex Playground - Run Reflex in Your Browser</title>

		<!-- Primary Meta Tags -->
		<meta name="title" content="Reflex Playground - Run Reflex in Your Browser" />
		<meta
			name="description"
			content="A browser-based Reflex playground powered by Pyodide. Write, edit, and run Reflex apps entirely in your browser with no server required."
		/>
		<meta
			name="keywords"
			content="reflex, python, playground, pyodide, webassembly, browser, ide, code editor, reflex tutorial, learn reflex"
		/>
		<meta name="author" content="Reflex Playground" />
		<meta name="theme-color" content="#0c4b33" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://django.farhana.li" />
		<meta property="og:title" content="Reflex Playground - Run Reflex in Your Browser" />
		<meta
			property="og:description"
			content="A browser-based Reflex playground powered by Pyodide. Write, edit, and run Reflex apps entirely in your browser with no server required."
		/>
		<meta property="og:image" content="https://django.farhana.li/og-image.png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://django.farhana.li" />
		<meta property="twitter:title" content="Reflex Playground - Run Reflex in Your Browser" />
		<meta
			property="twitter:description"
			content="A browser-based Reflex playground powered by Pyodide. Write, edit, and run Reflex apps entirely in your browser with no server required."
		/>
		<meta property="twitter:image" content="https://django.farhana.li/og-image.png" />

		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="alternate icon" href="/favicon.ico" />

		<!-- Canonical URL -->
		<link rel="canonical" href="https://django.farhana.li" />

		<!-- Robots -->
		<meta name="robots" content="index, follow" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
